name: Static Export

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 18
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npx eslint . --max-warnings=0 || npx eslint .
      - name: Static export
        run: npm run export
      - name: Upload static site
        uses: actions/upload-artifact@v4
        with:
          name: static-site
          path: out
