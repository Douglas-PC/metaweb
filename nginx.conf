server {
  listen 80;
  server_name _;

  # Root points to exported static site
  root /usr/share/nginx/html;
  index index.html;

  # Gzip basic
  gzip on;
  gzip_types text/plain text/css application/javascript application/json image/svg+xml;
  gzip_min_length 1024;

  # Cache static assets aggressively (hashed filenames)
  location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|webp|ico)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # HTML: short cache to allow quick updates
  location ~* \.(?:html)$ {
    add_header Cache-Control "public, max-age=60";
  }

  # SPA-style fallback for any path to index.html (optional for static export)
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Health endpoint (file created in Dockerfile)
  location = /healthz {
    add_header Cache-Control "no-store";
    try_files /healthz =200;
  }
}
